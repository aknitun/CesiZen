name: Deploy (VM Proxmox)

# Se déclenche automatiquement à chaque push sur main,
# et peut aussi être lancé manuellement depuis l'onglet Actions de GitHub
# (bouton "Run workflow").
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    # Ce job ne tourne PAS sur les serveurs GitHub, mais directement
    # sur le runner auto-hébergé installé sur la VM Proxmox de Louis.
    runs-on: self-hosted

    steps:
      - name: Réparation des permissions (le conteneur PHP écrit en root sur le bind mount)
        # Le conteneur php tourne en root et génère des fichiers (assets EasyAdmin, cache, etc.)
        # directement dans le dossier monté depuis la VM. Ces fichiers appartiennent donc à root
        # côté VM, ce qui empêche github-runner (non-root) de les modifier/supprimer au prochain
        # déploiement. On corrige la propriété AVANT de toucher au dépôt Git.
        run: |
          cd /opt/CesiZen
          docker compose --env-file .env.docker exec -T --user root php chown -R $(id -u):$(id -g) /var/www/html || true

      - name: Récupération de la dernière version du code (git pull)
        run: |
          cd /opt/CesiZen
          git fetch origin main
          git reset --hard origin/main

      - name: Reconstruction et redémarrage des conteneurs Docker
        run: |
          cd /opt/CesiZen
          docker compose --env-file .env.docker down
          docker compose --env-file .env.docker up -d --build

      - name: Mise à jour des dépendances et vidage du cache Symfony
        # vendor/ et var/ sont des volumes Docker persistants (voir docker-compose.yml) :
        # ils ne sont PAS régénérés par --build, il faut donc les rafraîchir explicitement
        # dans le conteneur en cours d'exécution à chaque déploiement.
        run: |
          cd /opt/CesiZen
          docker compose --env-file .env.docker exec -T php composer install --no-interaction --no-progress --prefer-dist
          docker compose --env-file .env.docker exec -T php php bin/console cache:clear

      - name: Application des migrations de base de données
        run: |
          cd /opt/CesiZen
          docker compose --env-file .env.docker exec -T php php bin/console doctrine:migrations:migrate --no-interaction