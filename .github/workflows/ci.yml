name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      database:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_ENV: test
      APP_SECRET: ci-test-secret
      DATABASE_URL: "postgresql://app:app@127.0.0.1:5432/app_test?serverVersion=16&charset=utf8"

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: ctype, iconv, pdo_pgsql, intl, opcache
          coverage: none

      - name: Cache des dépendances Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Installation des dépendances (Composer)
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Création du schéma de base de données (migrations Doctrine)
        run: |
          php bin/console doctrine:database:create --if-not-exists --no-interaction
          php bin/console doctrine:migrations:migrate --no-interaction

      - name: Exécution des tests PHPUnit
        run: vendor/bin/phpunit